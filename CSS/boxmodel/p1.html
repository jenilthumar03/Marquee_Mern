<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h2>Box Model</h2>
    <p>Every element on the page has its own box, which can be styled using CSS.</p>
    <p>From the inside out:</p>
    <ul>
        <li class="yellow">content</li>
        <li>padding</li>
        <li class="yellow">border</li>
        <li>margin</li>
    </ul>

    <h3>Background</h3>
    <p>Keep in mind that a <span>background</span> will cover the content and padding.</p>
</body>
</html>
