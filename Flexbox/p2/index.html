<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Technology Section</title>

        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <aside class="sidebar">

                <h3>Technologies</h3>

                <ul>
                    <li class="active">
                        <i class="fa-solid fa-desktop"></i>
                        Frontend
                    </li>

                    <li>
                        <i class="fa-solid fa-server"></i>
                        Backend
                    </li>

                    <li>
                        <i class="fa-solid fa-mobile-screen"></i>
                        Mobile
                    </li>

                    <li>
                        <i class="fa-solid fa-layer-group"></i>
                        Platforms
                    </li>

                    <li>
                        <i class="fa-solid fa-database"></i>
                        Databases
                    </li>
                </ul>

            </aside>

            <main class="content">

                <div class="title">

                    <div class="icon">
                        <i class="fa-solid fa-desktop"></i>
                    </div>

                    <div>
                        <h1>Frontend</h1>
                        <span></span>
                    </div>

                </div>

                <div class="cards">

                    <div class="card">
                        <i class="fa-brands fa-angular fa-2xl"
                            style="color: rgb(237, 14, 14);"></i>
                        <h4>AngularJS</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-react fa-2xl"
                            style="color: rgb(116, 192, 252);"></i>
                        <h4>ReactJS</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-vuejs fa-2xl"
                            style="color: rgb(75, 194, 140);"></i>
                        <h4>Vue.js</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-square-js fa-2xl"
                            style="color: rgb(245, 224, 32);"></i>
                        <h4>JavaScript</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-css3-alt fa-2xl"
                            style="color: rgb(19, 112, 173);"></i>
                        <h4>CSS3</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-html5 fa-2xl"
                            style="color: rgb(207, 82, 48);"></i>
                        <h4>HTML5</h4>
                    </div>

                    <div class="card">
                        <i class="fa-brands fa-react fa-2xl"
                            style="color: rgb(0, 0, 0);"></i>
                        <h4>Next.js</h4>
                    </div>

                </div>

            </main>

        </div>

    </body>
</html>
