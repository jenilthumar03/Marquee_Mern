<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Document</title>
        <style>
        .container{
            width: 400px;
            height: 550px;
            background-color: snow;
            border-radius: 30px;
            border: 2px solid;
            margin: 0 auto;
        }
        .child{
            width: 100%;
            height: 35%;
            background-color: brown;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            
        }

        #profile{
            height: 170px;
            width: 170px;
            border-radius: 50%;
            border: 5px solid brown;
            margin: 50px 110px;
        }
        
        .content{
            text-align: center;
            margin-top: 70px;
        }
        
        button{
            background-color: #0095ff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 50px;
            color: #fff;
        }
        .btn {
            margin-top: 30px;
        }
        .likes{
            margin-top: 20px;
        }

    </style>
    </head>
    <body>
        <div class="container">
            <div class="child">
                <img id="profile" src="profile.png">
            </div>
            <div class="content">
                <h2><strong>CodingLab</strong></h2>
                <p>Youtuber & Blogger</p>
                <div class="icons" style="margin-top: 20px;">
                    <i class="fa-brands fa-facebook fa-2xl"
                        style="color: rgb(19, 70, 111);"></i>
                    <i class="fa-brands fa-twitter fa-2xl"
                        style="color: rgb(116, 192, 252);"></i>
                    <i class="fa-brands fa-instagram fa-2xl"
                        style="color: rgb(231, 46, 16);"></i>
                    <i class="fa-brands fa-youtube fa-2xl"
                        style="color: rgb(231, 46, 16);"></i>
                </div>
                <div class="btn">
                    <button><b>Subscribe</b></button>
                    <button><b>Message</b></button>
                </div>

                <div class="likes">
                    <i class="fa-regular fa-heart fa-lg" style="color: rgb(1, 7, 18);"></i>
                    <span>1M |</span>
                    <i class="fa-regular fa-comment fa-lg" style="color: rgb(1, 7, 18);"></i>
                    <span>10.6K |</span>
                    <i class="fa-regular fa-share-from-square fa-lg" style="color: rgb(1, 7, 18);"></i>
                    <span>11.9K</span>
                </div>
            </div>
        </div>
    </body>
</html>
